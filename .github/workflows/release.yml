# Build the installers on each target OS and publish them.
#
#   workflow_dispatch → build + upload artifacts only (dry-run the pipeline
#                       without cutting a tag)
#   push tag v*       → same, plus a GitHub Release with the installers attached
#
# Each OS builds on its own runner: PyInstaller cannot cross-compile the sidecar
# (it embeds the host's Python runtime), and neither can the platform webview
# (docs/01「CI（GitHub Actions）」, ADR-18).
#
# Remember to bump `version` in src-tauri/tauri.conf.json before tagging — it is
# independent of the git tag and names the installer.
name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundles: nsis
            artifact: windows-nsis
            path: src-tauri/target/release/bundle/nsis/*-setup.exe
          # macos-latest is Apple Silicon (aarch64); the .dmg runs on M1+ only.
          # Intel support = a second runner (macos-13), NOT a universal binary:
          # PyInstaller cannot emit a universal2 sidecar from uv's single-arch
          # interpreter, and two one-file binaries cannot be lipo-merged (the
          # appended CArchive lives outside the Mach-O image and is lost). ADR-18.
          - os: macos-latest
            bundles: dmg
            artifact: macos-aarch64-dmg
            path: src-tauri/target/release/bundle/dmg/*.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # The same script the dev machine runs: it derives the target triple from
      # `rustc -vV` and the exe suffix from $env:OS (unset on macOS → no suffix),
      # so it is already correct here. Emits src-tauri/binaries/fetch-<triple>[.exe],
      # which tauri.conf.json's bundle.externalBin picks up.
      - name: Build the yfinance sidecar (PyInstaller)
        shell: pwsh
        run: ./tools/package-sidecar.ps1

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      # Same binary `cargo tauri` shims to, but prebuilt — `cargo install
      # tauri-cli` would recompile it from source on every run.
      - name: Install the Tauri CLI
        run: npm install -g @tauri-apps/cli@2.10.1

      # From the repo root, exactly like the dev machine: beforeBuildCommand
      # (`npm run build`, resolved into frontend/) produces frontend/out.
      # --bundles overrides bundle.targets:"all" — no MSI (WiX download flake).
      # No signing keys needed: plugins.updater is unset, so no updater
      # artifacts are requested (the macOS app ships UNSIGNED — see README).
      - name: Build the app bundle
        run: tauri build --bundles ${{ matrix.bundles }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}
          if-no-files-found: error
          retention-days: 14

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Needed for --notes-file below.
      - uses: actions/checkout@v4

      # No `name` → downloads every artifact into dist/<artifact-name>/…
      - uses: actions/download-artifact@v4
        with:
          path: dist

      # `gh` is preinstalled on every runner; using it directly avoids depending
      # on a third-party release action's input names. Idempotent: creating a
      # release in the UI also publishes the tag, which re-triggers this
      # workflow — so if the release already exists, just attach/refresh the
      # installers (--clobber) without touching its title/notes.
      - name: Publish the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/*/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "Alpha Radar $GITHUB_REF_NAME" \
              --notes-file .github/release-notes.md \
              dist/*/*
          fi
