# Fast checks on every push / PR. The sidecar and the installers are NOT built
# here — that is release.yml, which costs minutes per run (docs/01「CI」).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    # windows-latest mirrors the dev machine and needs no system deps (WebView2
    # is preinstalled); ubuntu would need the webkit2gtk stack for the tauri crate.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Frontend typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      # Must precede the Rust steps: generate_context! embeds frontendDist
      # (../frontend/out) at compile time.
      - name: Frontend static export
        working-directory: frontend
        run: npm run build

      # tauri-build validates that every externalBin exists whenever the crate
      # COMPILES (even `cargo test`/`clippy`), so it would otherwise need the
      # ~41MB PyInstaller sidecar. The unit/golden tests never spawn it (the
      # sidecar tests are #[ignore]), so a zero-byte placeholder at the expected
      # path satisfies the check and keeps CI fast. The real sidecar is built
      # only in release.yml.
      - name: Placeholder sidecar (externalBin existence check)
        shell: pwsh
        run: |
          $triple = (& rustc -vV | Select-String 'host:').ToString().Split(' ')[-1]
          New-Item -ItemType Directory -Force src-tauri/binaries | Out-Null
          New-Item -ItemType File -Force "src-tauri/binaries/fetch-$triple.exe" | Out-Null

      - name: cargo test (golden values)
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
